logging:
  level:
    root: info
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${POSTGRESQL_URL}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLE:false}
aplazo:
  url:
    api:
      # Prod: auth-hydra base URL is mandatory (CloudMap internal name). No default — fail fast if unset.
      auth-hydra-url: ${AUTH_HYDRA_URL}