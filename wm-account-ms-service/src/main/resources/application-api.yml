logging:
  level:
    root: info
api:
  aplazo:
    customer:
      account:
        changes:
          sqs:
            enabled: ${API_APLAZO_CUSTOMER_ACCOUNT_CHANGES_SQS_ENABLED:true}
            queueName: ${API_APLAZO_CUSTOMER_ACCOUNT_CHANGES_SQS_QUEUE_NAME:wm_customer_account_changes_local}
aplazo:
  cloudaws:
    sqs:
      region: ${AWS_REGION:us-east-1}
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${POSTGRESQL_URL}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLE:false}