version: '3.8'
services:

  # --------------------------------------------------------------------------
  # PostgreSQL
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:14-alpine
    container_name: wm-account-ms-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql
    environment:
      POSTGRES_DB: wm_account_db
      POSTGRES_USER: wm_account_user
      POSTGRES_PASSWORD: wm_account_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wm_account_user -d wm_account_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # LocalStack — AWS SQS emulator
  # The init script (scripts/localstack/init-sqs.sh) creates the SQS queue
  # automatically once LocalStack is ready.
  # --------------------------------------------------------------------------
  # nosemgrep: yaml.docker-compose.security.writable-root-filesystem
  # read_only: true cannot be applied — LocalStack 3 is a Python app that writes
  # to system paths (/usr/local/lib/python*, /root/.localstack) at startup and
  # cannot run reliably with a read-only root filesystem in a local dev environment.
  # Risk is minimal: this compose file is used exclusively for local development.
  localstack:
    image: localstack/localstack:3
    container_name: wm-account-ms-localstack
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs,sns
      DEFAULT_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      LOCALSTACK_AUTH_TOKEN: ""
    volumes:
      - ./scripts/localstack:/etc/localstack/init/ready.d
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  localstack_data:
